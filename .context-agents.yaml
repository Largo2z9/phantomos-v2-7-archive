# .context-agents.yaml — Agent registry and permissions
# Anchor: D#252 (agent-plug-guide-ux.md)
#
# Each agent declaration includes:
# - id_pattern: agent identifier (format: {slug}@v{version})
# - allowed_entities: which JSON entities the agent can touch
# - allowed_modes: proposal | direct (direct only for humans and whitelisted agents)
# - max_confidence: maximum confidence this agent can propose (humans = 1.0, agents ≤ 0.9)
# - owner: who built/maintains this agent
# - description: what it does

agents:
  # ============================================================================
  # RESEARCH AGENTS (Phase 1) — Voice of market mining & fit analysis
  # ============================================================================

  - id_pattern: "audience-miner@*"
    allowed_entities: [profile]
    allowed_modes: [proposed]
    max_confidence: 0.85
    owner: "largo"
    description: >
      Scrape voice-of-market (Reddit, Trustpilot, Meta Ads Library) for a product.
      Mine pain points, desires, objections, and voice markers.
      Propose enrichments to profile.json (psychology, voice, pain_points, objections).

  - id_pattern: "product-audience-fit@*"
    allowed_entities: [learning]
    allowed_modes: [proposed]
    max_confidence: 0.85
    owner: "largo"
    description: >
      Analyze fit between product (spec.json) and audience (profile.json).
      Compute fit score 0–10, identify gaps, propose strategic priority.
      Outputs: markdown analysis report + optional proposals to profile.brand_alignment.

  # ============================================================================
  # HUMAN OVERRIDE (always whitelisted)
  # ============================================================================

  - id_pattern: "human:*"
    allowed_entities: [brand, product, offer, profile, learning, strategy]
    allowed_modes: [proposed, direct]
    max_confidence: 1.0
    owner: "system"
    description: "Human operator override. Can write directly (mode=direct, confidence=1.0) to any entity."

  # ============================================================================
  # PLAYBOOK AGENTS (structured workflows)
  # ============================================================================

  - id_pattern: "playbook:*"
    allowed_entities: [brand, product, offer, profile, learning, strategy]
    allowed_modes: [proposed]
    max_confidence: 0.9
    owner: "largo"
    description: "Registered playbooks / orchestrators. Execute multi-step workflows with proposal mode."

